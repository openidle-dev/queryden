<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/img/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QueryDen</title>
    <style>
      /* Dark-only by design — the app boots into dark by default and the
         native window backgroundColor (see tauri.conf.json) is already #0b0f17.
         No prefers-color-scheme rule on purpose: that previously caused a
         light/dark mismatch flash when the OS reported light but React mounted
         in dark. */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0f17;
        color: #e2e8f0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
          Arial, sans-serif;
      }
      #root {
        height: 100%;
      }
      .qd-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(
            ellipse 60% 40% at 50% 50%,
            rgba(6, 182, 212, 0.08) 0%,
            transparent 70%
          ),
          #0b0f17;
        z-index: 9999;
        transition: opacity 320ms ease-out;
        pointer-events: none;
        opacity: 1;
        animation: qd-splash-in 220ms ease-out both;
      }
      .qd-splash--fade {
        opacity: 0;
      }
      .qd-splash__logo {
        width: 84px;
        height: 84px;
        image-rendering: -webkit-optimize-contrast;
        filter: drop-shadow(0 8px 24px rgba(6, 182, 212, 0.25));
        animation: qd-float 3s ease-in-out infinite;
      }
      .qd-splash__wordmark {
        display: flex;
        align-items: baseline;
        gap: 1px;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .qd-splash__wordmark-q {
        color: #e2e8f0;
      }
      .qd-splash__wordmark-d {
        background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      .qd-splash__tagline {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #475569;
      }
      @keyframes qd-splash-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes qd-float {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="portal"></div>
    <div id="qd-splash" class="qd-splash" aria-hidden="true">
      <img class="qd-splash__logo" src="/img/icon.png" alt="" />
      <div class="qd-splash__wordmark">
        <span class="qd-splash__wordmark-q">Query</span><span class="qd-splash__wordmark-d">Den</span>
      </div>
      <div class="qd-splash__tagline">A modern database manager</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
