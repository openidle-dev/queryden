<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QueryDen</title>
    <style>
      /* Match the dark surface so the first paint after WebView2 init doesn't
         flash white before React mounts and globals.css applies its tokens.
         The native window backgroundColor in tauri.conf.json covers the
         pre-HTML canvas; this covers the gap between HTML parse and CSS. */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0f17;
      }
      #root {
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
