<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QueryDen</title>
    <style>
      /* Splash painted by WebView2 *before* the JS bundle parses. Without it
         the user sees a blank window for the duration of bundle parse +
         React mount + initial IPC roundtrips. React replaces #root contents
         on mount, removing the splash automatically. Theme tokens are
         hardcoded here because globals.css hasn't loaded yet. */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0f17;
        color: #e2e8f0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
          Arial, sans-serif;
      }
      #root {
        height: 100%;
      }
      .qd-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #0b0f17;
      }
      .qd-splash__mark {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
        position: relative;
        animation: qd-pulse 1.4s ease-in-out infinite;
      }
      .qd-splash__title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: #cbd5e1;
      }
      .qd-splash__hint {
        font-size: 12px;
        color: #64748b;
        letter-spacing: 0.02em;
      }
      @keyframes qd-pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.9;
        }
        50% {
          transform: scale(1.06);
          opacity: 1;
        }
      }
      @media (prefers-color-scheme: light) {
        html,
        body,
        .qd-splash {
          background: #f8fafc;
          color: #0f172a;
        }
        .qd-splash__title {
          color: #1e293b;
        }
        .qd-splash__hint {
          color: #64748b;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="qd-splash" aria-hidden="true">
        <div class="qd-splash__mark"></div>
        <div class="qd-splash__title">QueryDen</div>
        <div class="qd-splash__hint">Loading…</div>
      </div>
    </div>
    <div id="portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
