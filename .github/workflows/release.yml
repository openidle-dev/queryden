name: Release

# Trigger by pushing a tag like v1.2.3.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
          # NOTE: macos-13 (Intel) runners are heavily rate-limited on the free
          # GitHub Actions plan and routinely queue for hours. Intel macOS
          # support deliberately omitted from v1.0.5; planned for v1.0.6 as a
          # universal-apple-darwin build that produces a single fat binary on
          # the Apple Silicon runner.

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - run: npm ci

      - name: Build app
        env:
          # Signing credentials for tauri-plugin-updater. With these set and
          # `createUpdaterArtifacts: true` in tauri.conf.json, Tauri auto-
          # generates a `<artifact>.sig` companion file for every bundle that
          # the updater supports — these are what clients verify against the
          # pubkey baked into the app at build time.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Generate SHA256 companion files
        shell: bash
        run: |
          set -euo pipefail
          # Use `find` instead of bash globstar — macOS ships bash 3.2 which
          # doesn't support `shopt -s globstar` and `set -e` makes the failure
          # explode the step.
          if command -v sha256sum >/dev/null 2>&1; then
            HASH_CMD="sha256sum"
          else
            HASH_CMD="shasum -a 256"
          fi

          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ ! -d "$TARGET_DIR" ]; then
            echo "::warning::Bundle dir $TARGET_DIR not found; skipping checksum step."
            exit 0
          fi

          find "$TARGET_DIR" -type f \
            \( -name '*.deb' -o -name '*.AppImage' \
            -o -name '*.exe' -o -name '*.msi' \
            -o -name '*.dmg' -o -name '*.app.tar.gz' \) \
            -print | while IFS= read -r f; do
              $HASH_CMD "$f" | awk '{print $1}' > "$f.sha256"
              echo "Wrote $f.sha256"
            done

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sha256
          if-no-files-found: warn

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.deb" -o -name "*.AppImage" \
            -o -name "*.exe" -o -name "*.msi" \
            -o -name "*.dmg" -o -name "*.app.tar.gz" \
            -o -name "*.sig" -o -name "*.sha256" \
          \) -exec cp {} release/ \;
          ls -la release

      - name: Generate latest.json (tauri-plugin-updater manifest)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Helper: find first file matching glob, empty string if none.
          first() { ls release/$1 2>/dev/null | head -1 || true; }

          PLATFORMS='{}'

          # Windows (x86_64) — NSIS .exe + .sig
          WIN_EXE=$(first '*_x64-setup.exe')
          WIN_SIG=$(first '*_x64-setup.exe.sig')
          if [ -n "$WIN_EXE" ] && [ -n "$WIN_SIG" ]; then
            PLATFORMS=$(jq \
              --arg sig "$(cat "$WIN_SIG")" \
              --arg url "$BASE_URL/$(basename "$WIN_EXE")" \
              '. + {"windows-x86_64": {signature: $sig, url: $url}}' <<<"$PLATFORMS")
          fi

          # macOS Apple Silicon — .app.tar.gz + .sig (the .dmg stays on the
          # release for first-install downloads, but the updater channel
          # uses the tar.gz of the .app bundle).
          MAC_TGZ=$(first '*aarch64.app.tar.gz')
          MAC_SIG=$(first '*aarch64.app.tar.gz.sig')
          if [ -n "$MAC_TGZ" ] && [ -n "$MAC_SIG" ]; then
            PLATFORMS=$(jq \
              --arg sig "$(cat "$MAC_SIG")" \
              --arg url "$BASE_URL/$(basename "$MAC_TGZ")" \
              '. + {"darwin-aarch64": {signature: $sig, url: $url}}' <<<"$PLATFORMS")
          fi

          # Linux x86_64 — AppImage + .sig (.deb has no updater path).
          LINUX_APP=$(first '*.AppImage')
          LINUX_SIG=$(first '*.AppImage.sig')
          if [ -n "$LINUX_APP" ] && [ -n "$LINUX_SIG" ]; then
            PLATFORMS=$(jq \
              --arg sig "$(cat "$LINUX_SIG")" \
              --arg url "$BASE_URL/$(basename "$LINUX_APP")" \
              '. + {"linux-x86_64": {signature: $sig, url: $url}}' <<<"$PLATFORMS")
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes "See https://github.com/${{ github.repository }}/releases/tag/${TAG} for release notes." \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > release/latest.json

          echo "::group::latest.json"
          cat release/latest.json
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*
