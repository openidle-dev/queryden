name: Release

# Trigger by pushing a tag like v1.2.3.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - platform: macos-13
            target: x86_64-apple-darwin
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - run: npm ci

      - name: Build app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Generate SHA256 companion files
        shell: bash
        run: |
          set -euo pipefail
          # Use `find` instead of bash globstar — macOS ships bash 3.2 which
          # doesn't support `shopt -s globstar` and `set -e` makes the failure
          # explode the step.
          if command -v sha256sum >/dev/null 2>&1; then
            HASH_CMD="sha256sum"
          else
            HASH_CMD="shasum -a 256"
          fi

          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ ! -d "$TARGET_DIR" ]; then
            echo "::warning::Bundle dir $TARGET_DIR not found; skipping checksum step."
            exit 0
          fi

          find "$TARGET_DIR" -type f \
            \( -name '*.deb' -o -name '*.AppImage' \
            -o -name '*.exe' -o -name '*.msi' \
            -o -name '*.dmg' \) \
            -print | while IFS= read -r f; do
              $HASH_CMD "$f" | awk '{print $1}' > "$f.sha256"
              echo "Wrote $f.sha256"
            done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sha256
          if-no-files-found: warn

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.deb" -o -name "*.AppImage" \
            -o -name "*.exe" -o -name "*.msi" \
            -o -name "*.dmg" \
            -o -name "*.sha256" \
          \) -exec cp {} release/ \;
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*
