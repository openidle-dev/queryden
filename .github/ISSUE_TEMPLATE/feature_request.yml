name: Feature request
description: Suggest a new capability, improvement, or supported database.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement. Before filing, please skim open issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing pain or workflow gap, not the solution. "I have to switch to psql every time I want to inspect a function definition" is more useful than "Add a function definition viewer".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like QueryDen to do. Sketches, mockups, and SQL examples are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools that solve this, or workarounds you currently use.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Rough size
      description: Your best guess — we'll adjust during triage.
      options:
        - Small (UI polish, single component)
        - Medium (new dialog, new store, schema change)
        - Large (new database driver, new top-level feature)
        - Not sure
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you offering to help?
      options:
        - label: I'd like to attempt a PR for this if the proposal is accepted.
          required: false
